  .tab{flex:none;padding:9px 18px;border-radius:20px;border:2px solid var(--line);
       background:#fff;color:var(--muted);font:inherit;font-weight:700;font-size:.76rem;
       text-transform:uppercase;letter-spacing:.8px;cursor:pointer;transition:.15s}
  .tab:hover:not(.active){border-color:var(--blue);color:var(--blue)}
  .tab.active{background:var(--blue);border-color:var(--blue);color:#fff}

  .wrap{max-width:1000px;margin:0 auto;padding:14px}
  .page{display:none}.page.active{display:block}

  .status{display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:10px 14px;font-size:.78rem;color:var(--muted);font-weight:600;margin-bottom:14px}
  .pill{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:3px 10px;
    font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1px}
  .pill.live{background:#FFEDEB;color:var(--red);border:1px solid var(--red)}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:p 1s infinite}

  .legend span.k{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px}

const fold = s => (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
const INDEX = {};
Object.keys(TEAM_DATA).forEach(n => INDEX[fold(n)] = n);
Object.keys(ALIASES).forEach(a => INDEX[fold(a)] = ALIASES[a]);

function canon(name){
  name = (name||'').trim();
  if (!name) return '';
  if (TEAM_DATA[name]) return name;
  if (ALIASES[name]) return ALIASES[name];
  return INDEX[fold(name)] || name;
}

/* ============ LOAD (JSONP - no CORS) ============ */
function jsonp(url, ms){
  ms = ms || 12000;
  return new Promise((ok, bad) => {
    const cb = 'cb_' + Math.random().toString(36).slice(2);
    const s = document.createElement('script');
    let done = false;
    const clean = () => { try{ delete window[cb]; }catch(e){ window[cb]=undefined; }
                          if (s.parentNode) s.parentNode.removeChild(s); };
    const timer = setTimeout(() => { if(done) return; done=true; clean();
                                     bad(new Error('Time-out na '+ms+'ms')); }, ms);
    window[cb] = d => { if(done) return; done=true; clearTimeout(timer); clean(); ok(d); };
    s.onerror = () => { if(done) return; done=true; clearTimeout(timer); clean();
                        bad(new Error('Script kon niet laden')); };
    s.src = url + (url.indexOf('?')===-1?'?':'&') + 'callback=' + cb + '&t=' + Date.now();
    document.head.appendChild(s);
  });
}

async function load(){
  /* --- 1. fetch --- */
  let rows;
  try {
    rows = await jsonp(DATA_URL);
    if (!Array.isArray(rows) || !rows.length || rows[0].indexOf('Home Team') === -1)
      throw new Error('Onverwacht dataformaat');
  } catch (e){
    document.getElementById('stat').textContent = 'Kon live data niet laden';
    fail('Kon de gegevensbron niet bereiken.', e);
    console.error('DATA ERROR:', e);
    return;
  }

  /* --- 2. parse --- */
  const h = rows[0].map(x => String(x).trim());
  const c = n => h.indexOf(n);
  const iD=c('Date'), iG=c('Group'), iH=c('Home Team'), iA=c('Away Team'),
        iHS=c('Home Score'), iAS=c('Away Score'), iS=c('Status'), iI=c('Match ID');

  MATCHES = rows.slice(1)
    .filter(r => r && r.length > 1)
    .map(r => {
      const hs = String(r[iHS]).trim(), as = String(r[iAS]).trim();
      return {
        id: String(r[iI]).trim(),
        date: r[iD],
        group: String(r[iG]).trim(),
        home: canon(r[iH]),
        away: canon(r[iA]),
        hs: hs === '' ? null : parseInt(hs,10),
        as: as === '' ? null : parseInt(as,10),
        status: String(r[iS]).trim()
      };
    });

  document.getElementById('stat').textContent =
    'Laatst bijgewerkt ' +
    new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'}) +
    ' \u00b7 ' + MATCHES.length + ' wedstrijden';

  /* --- 3. render (deliberately outside the try above, so a display
         bug can never masquerade as a data-source failure) --- */
  try { renderDraw(); renderKO(); }
  catch (e){
    fail('Data geladen (' + MATCHES.length + ' wedstrijden), maar tonen ging mis.', e);
    console.error('RENDER ERROR:', e);
  }
}

function fail(text, err){
  const html = '<div class="msg">&#9888;&#65039; ' + text +
               (err ? '<code>' + (err.message || err) + '</code>' : '') + '</div>';
  document.getElementById('drawGrid').innerHTML = html;
  document.getElementById('koBox').innerHTML = html;
}

/* ============ STATUS, DERIVED FROM RESULTS ============ */
/* No hardcoded table. A team is:
     out   - lost a finished knockout match, or never reached the knockouts
     in    - still alive
*/
function computeStatus(){
  const ko = MATCHES.filter(m => m.group === '');
  const reached = new Set();
  const lost = new Set();

  ko.forEach(m => {
    if (m.home) reached.add(m.home);
    if (m.away) reached.add(m.away);
    if (m.status === 'FINISHED' && m.hs !== null && m.as !== null && m.hs !== m.as){
      lost.add(m.hs > m.as ? m.away : m.home);
    }
  });

  const st = {};
  Object.keys(TEAM_DATA).forEach(t => {
    st[t] = (!reached.has(t) || lost.has(t)) ? 'out' : 'in';
  });
  return st;
}

    if (byOwner[d.owner]) byOwner[d.owner].push(Object.assign({name}, d));
  });

  /* most teams still standing first */
  const order = ALL_OWNERS.slice().sort((a,b) => {
    const av = byOwner[a].filter(t => st[t.name]==='in').length;
    const bv = byOwner[b].filter(t => st[t.name]==='in').length;
    return bv - av || a.localeCompare(b);
  });

  grid.innerHTML = order.map(o => {
    const ts = byOwner[o].slice().sort((a,b) => a.tier - b.tier);
    const alive = ts.filter(t => st[t.name]==='in').length;
    const rows = ts.map(t => {
      const cls = st[t.name]==='in' ? 'in' : 'out';
      return '<div class="trow ' + cls + '">' +
               '<span class="fl">' + t.flag + '</span>' +
               '<span class="tn">' + t.name + '</span>' +
               '<span class="tier t' + t.tier + '"></span>' +
             '</div>';
    }).join('');
    return '<div class="oc"><h3>' + o +
      '<span class="cnt' + (alive===0 ? ' zero':'') + '">' + alive + ' actief</span></h3>' +
      rows + '</div>';
  }).join('');
}

/* ============ RENDER: BRACKET (QF onwards) ============ */
function teamRow(name, m){
  if (!name) return '<div class="bt tbd">nog te bepalen</div>';
  const d = info(name);
  const flag = d ? d.flag : '??';
  const owner = d ? d.owner : null;
  const tag = owner
    ? '<span class="bo" style="background:' + (OWNER_COLOUR[owner]||'#888') + '">' + owner + '</span>'
    : '';

  let cls = '', score = '';
  if (m && m.status === 'FINISHED' && m.hs !== null && m.as !== null){
    const isHome = m.home === name;
    const mine = isHome ? m.hs : m.as;
    const other = isHome ? m.as : m.hs;
    score = '<span class="sc">' + mine + '</span>';
    cls = mine > other ? ' won' : (mine < other ? ' lost' : '');
  }
  return '<div class="bt' + cls + '">' +
           '<span class="bf">' + flag + '</span>' +
           '<span class="bn">' + name + '</span>' + tag + score +
         '</div>';
}

function matchCard(id, label, extraClass){
  const m = byId(id);
  const done = m && m.status === 'FINISHED';
  const when = m && m.date
    ? new Date(m.date).toLocaleDateString('nl-NL',{day:'numeric',month:'short'})
    : '';
  return '<div class="bm ' + (done ? 'done' : 'next') + (extraClass ? ' '+extraClass : '') + '">' +
           '<div class="hd"><span>' + label + '</span><span>' + when + '</span></div>' +
           teamRow(m ? m.home : '', m) +
           teamRow(m ? m.away : '', m) +
         '</div>';
}

function renderKO(){
  const qf = QF_IDS.map((id,i) => matchCard(id, 'Kwartfinale ' + (i+1))).join('');
  const sf = SF_IDS.map((id,i) => matchCard(id, 'Halve finale ' + (i+1))).join('');

  document.getElementById('koBox').innerHTML =
    '<div class="bwrap"><div class="btree">' +
      '<div class="bcol"><h4>Kwartfinales</h4>' + qf + '</div>' +
      '<div class="bcol"><h4>Halve finales</h4>' + sf + '</div>' +
      '<div class="bcol"><h4>Finale</h4>' +
        '<div class="cup">&#127942;</div>' +
        matchCard(FINAL_ID, 'Finale', 'final') +
        '<div style="height:14px"></div>' +
        matchCard(THIRD_ID, 'Om 3e plaats') +
      '</div>' +
    '</div></div>';
}

/* ============ TABS ============ */
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.page).classList.add('active');
  };
});

/* ============ GO ============ */
load();
setInterval(load, REFRESH_MS);
</script>
